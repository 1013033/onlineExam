<!doctype html>
<!--
  web/index.html — Mock Exam Platform Portal
  Content controlled by: 114-4-chinese/content.md  (# PORTAL section)
  Build: cd 114-4-chinese && npm run build
-->
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>學術能力模擬檢測 - 線上測驗平台入口</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: oklch(98% 0.005 240);
      --surface: oklch(100% 0 0);
      --surface-2: oklch(96.5% 0.008 245);
      --fg: oklch(16% 0.015 245);
      --muted: oklch(50% 0.015 245);
      --border: oklch(90% 0.006 245);
      --accent: oklch(56% 0.19 255);
      --accent-soft: oklch(94% 0.035 255);
      --accent-2: oklch(62% 0.16 65);
      --r-md: 12px;
      --shadow-lift: 0 10px 30px -15px oklch(20% 0.02 245 / 0.12),
                     0 3px 8px -3px oklch(20% 0.02 245 / 0.04);
      --shadow-hover: 0 18px 40px -10px oklch(20% 0.02 245 / 0.18),
                      0 5px 15px -3px oklch(20% 0.02 245 / 0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: oklch(15% 0.015 250);
        --surface: oklch(19.5% 0.015 250);
        --surface-2: oklch(22.5% 0.015 250);
        --fg: oklch(95% 0.006 250);
        --muted: oklch(65% 0.012 250);
        --border: oklch(26% 0.016 250);
        --accent: oklch(68% 0.16 255);
        --accent-soft: oklch(28% 0.07 255);
        --shadow-lift: 0 12px 35px -15px oklch(0% 0 0 / 0.5),
                       0 4px 10px -3px oklch(0% 0 0 / 0.25);
        --shadow-hover: 0 20px 45px -10px oklch(0% 0 0 / 0.65),
                        0 6px 18px -3px oklch(0% 0 0 / 0.35);
      }
    }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Noto Sans TC", "Nunito", sans-serif;
      margin: 0;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      text-align: center;
      margin-bottom: 48px;
      max-width: 600px;
    }
    h1 {
      font-size: 32px;
      font-weight: 900;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 1000px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 28px;
      box-shadow: var(--shadow-lift);
      display: flex;
      flex-direction: column;
      transition: all 250ms ease;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }
    .card-tag {
      font-size: 11px;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 12px;
      line-height: 1.4;
    }
    .card-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
      flex: 1;
    }
    .card-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .card-btn {
      display: inline-block;
      text-align: center;
      background: var(--accent);
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      transition: all 150ms ease;
    }
    .card-btn:hover {
      background: color-mix(in oklab, var(--accent) 80%, black);
      text-decoration: none;
    }
    .card.placeholder {
      border-style: dashed;
      border-width: 2px;
      background: transparent;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
    }
    .card.placeholder:hover {
      border-color: var(--muted);
      transform: none;
      box-shadow: var(--shadow-lift);
    }
    .placeholder-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.6;
    }
    .placeholder-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--muted);
    }

    /* Header Sync Button */
    .sync-all-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      margin-top: 12px;
      transition: all 150ms ease;
    }
    .sync-all-btn:hover {
      background: var(--accent);
      color: white;
    }
    
    /* Sync Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transform: translateY(20px);
      transition: transform 0.3s ease;
      box-sizing: border-box;
    }
    .modal-overlay.active .modal-content {
      transform: translateY(0);
    }
    .modal-content h3 {
      margin: 0 0 12px;
      font-size: 20px;
      color: var(--fg);
    }
    .modal-desc {
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 20px;
      line-height: 1.5;
    }
    .qrcode-container {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .qrcode-container img {
      display: block;
    }
    .manual-link-container {
      width: 100%;
      margin-bottom: 20px;
      text-align: left;
    }
    .manual-link-container span {
      font-size: 13px;
      color: var(--fg);
      display: block;
      margin-bottom: 6px;
    }
    .manual-link-container input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      font-size: 12px;
      box-sizing: border-box;
    }
    .copy-link-btn {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s ease;
    }
    .copy-link-btn:hover {
      opacity: 0.9;
    }
    .close-modal-btn {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 8px;
    }
    .close-modal-btn:hover {
      background: var(--bg);
    }
    
    /* Toast Messages */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--fg);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: 99px;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      opacity: 0;
      z-index: 1000;
      transition: transform 300ms cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 300ms ease;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <header id="portal-header">
    <h1 id="portal-title">學術能力模擬檢測入口</h1>
    <div class="subtitle" id="portal-subtitle">歡迎來到模擬考試線上平台。</div>
    <button class="sync-all-btn" id="syncAllBtn" type="button">📲 跨裝置一鍵同步</button>
  </header>

  <div class="grid" id="exam-grid">
    <!-- populated by renderPortal() -->
  </div>

  <!-- portal-data.js is auto-generated by: cd 114-4-chinese && npm run build -->
  <script src="portal-data.js"></script>
  <script>
    function renderPortal() {
      // Render header from PORTAL data if available
      if (window.PORTAL && window.PORTAL.meta) {
        const m = window.PORTAL.meta;
        if (m.title)    document.getElementById('portal-title').textContent    = m.title;
        if (m.subtitle) document.getElementById('portal-subtitle').textContent = m.subtitle;
      }

      const grid = document.getElementById('exam-grid');
      grid.innerHTML = '';

      const exams = window.PORTAL && window.PORTAL.exams ? window.PORTAL.exams : [];

      // Render exam cards
      exams.forEach(exam => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-tag">${exam.tag || ''}</div>
          <h2 class="card-title">${exam.title || ''}</h2>
          <p class="card-desc">${exam.desc || ''}</p>
          <div class="card-meta">
            ${exam.time      ? `<span>⏱️ ${exam.time}</span>` : ''}
            ${exam.questions ? `<span>📝 ${exam.questions}</span>` : ''}
            ${exam.score     ? `<span>🎯 ${exam.score}</span>` : ''}
          </div>
          <a href="${exam.href || '#'}" class="card-btn">${exam.btnText || '進入考場'}</a>
        `;
        grid.appendChild(card);
      });

      // Always append placeholder card for future exams
      const placeholder = document.createElement('div');
      placeholder.className = 'card placeholder';
      placeholder.innerHTML = `
        <div class="placeholder-icon">📥</div>
        <div class="placeholder-title">未來新增試卷</div>
        <p style="font-size: 13px; color: var(--muted); margin-top: 8px; margin-bottom: 0;">在此目錄下新增其他學科與試卷資料夾，即可在此面板中進行串接與擴展。</p>
      `;
      grid.appendChild(placeholder);
    }

    function showToast(msg) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.className = 'toast';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // Global Sync Mechanism
    function checkSyncAll() {
      const hash = window.location.hash;
      if (hash && hash.startsWith('#syncAll=')) {
        const b64Data = hash.substring(9);
        // Clear hash immediately
        window.history.replaceState("", document.title, window.location.pathname + window.location.search);
        try {
          const jsonStr = decodeURIComponent(escape(atob(b64Data)));
          const payload = JSON.parse(jsonStr);
          
          let count = 0;
          for (const [key, data] of Object.entries(payload)) {
            const localState = {
              tasks: {},
              quiz: data.q || {},
              textAnswers: {},
              graded: data.g === 1,
              gradedQuestions: {},
              lastSection: ''
            };
            
            localStorage.setItem(key, JSON.stringify(localState));
            if (data.t !== null) {
              localStorage.setItem(`${key}-time-remaining`, data.t);
            }
            count++;
          }
          
          if (count > 0) {
            setTimeout(() => {
              showToast(`🟢 已成功同步 ${count} 科的練習進度！`);
            }, 300);
          }
        } catch (e) {
          console.error("Restore global progress failed:", e);
          showToast('🔴 同步失敗，進度資料格式錯誤。');
        }
      }
    }

    function initGlobalSync() {
      const btn = document.getElementById('syncAllBtn');
      if (btn) {
        btn.addEventListener('click', showGlobalSyncModal);
      }
      checkSyncAll();
    }

    function showGlobalSyncModal() {
      const payload = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.includes('progress') && !key.endsWith('-time-remaining')) {
          try {
            const stateVal = localStorage.getItem(key);
            const state = JSON.parse(stateVal);
            const timer = localStorage.getItem(`${key}-time-remaining`);
            if (state && state.quiz && Object.keys(state.quiz).length > 0) {
              payload[key] = {
                q: state.quiz,
                t: timer ? parseInt(timer, 10) : null,
                g: state.graded ? 1 : 0
              };
            }
          } catch(e) {}
        }
      }

      if (Object.keys(payload).length === 0) {
        showToast('⚠️ 目前本機尚無任何考科的作答紀錄可供同步！');
        return;
      }

      if (typeof QRCode === 'undefined') {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
        script.onload = () => generateGlobalSyncQR(payload);
        document.head.appendChild(script);
      } else {
        generateGlobalSyncQR(payload);
      }
    }

    function generateGlobalSyncQR(payload) {
      const b64Data = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
      const syncUrl = `${window.location.origin}${window.location.pathname}#syncAll=${b64Data}`;

      let modal = document.getElementById('syncModal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'syncModal';
        modal.className = 'modal-overlay';
        modal.innerHTML = `
          <div class="modal-content">
            <h3>全站進度同步</h3>
            <p class="modal-desc">請使用手機相機或 LINE 掃描下方二維碼，即可一次性將您在電腦端所有考科的作答進度與時間同步至手機。</p>
            <div id="qrcodeCanvas" class="qrcode-container"></div>
            <div class="manual-link-container">
              <span>手動複製連結：</span>
              <input id="syncUrlInput" type="text" readonly onclick="this.select()">
              <button class="copy-link-btn" id="copyLinkBtn">複製連結</button>
            </div>
            <button class="close-modal-btn" id="closeModalBtn">關閉</button>
          </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('closeModalBtn').addEventListener('click', hideGlobalSyncModal);
        document.getElementById('copyLinkBtn').addEventListener('click', () => {
          const input = document.getElementById('syncUrlInput');
          input.select();
          document.execCommand('copy');
          showToast('📋 連結已複製到剪貼簿！');
        });
      }

      document.getElementById('syncUrlInput').value = syncUrl;
      const qrcodeCanvas = document.getElementById('qrcodeCanvas');
      qrcodeCanvas.innerHTML = '';

      new QRCode(qrcodeCanvas, {
        text: syncUrl,
        width: 200,
        height: 200,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.M
      });

      modal.classList.add('active');
    }

    function hideGlobalSyncModal() {
      const modal = document.getElementById('syncModal');
      if (modal) modal.classList.remove('active');
    }

    renderPortal();
    initGlobalSync();
  </script>
</body>
</html>
