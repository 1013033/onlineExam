<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>線上考場入口</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --surface: #ffffff;
      --surface-2: #eef3f5;
      --fg: #172024;
      --muted: #607078;
      --border: #d9e0de;
      --accent: #176b87;
      --accent-2: #ba5a31;
      --accent-3: #4f7b45;
      --soft-blue: #e7f2f6;
      --soft-rust: #f8ebe4;
      --soft-green: #e9f3e7;
      --shadow: 0 16px 36px rgba(23, 32, 36, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --bg: #101518;
        --surface: #171e22;
        --surface-2: #1f292e;
        --fg: #eef4f3;
        --muted: #9caaa8;
        --border: #2e3a3f;
        --accent: #73bdd4;
        --accent-2: #e59770;
        --accent-3: #91c489;
        --soft-blue: #17303a;
        --soft-rust: #3a241a;
        --soft-green: #20321e;
        --shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--surface-2) 55%, transparent), transparent 280px),
        var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.15;
      font-weight: 900;
    }

    .subtitle {
      max-width: 720px;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .sync-all-btn,
    .nav-btn,
    .card-btn,
    .copy-link-btn,
    .close-modal-btn {
      min-height: 42px;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .sync-all-btn {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--fg);
      padding: 0 14px;
      box-shadow: var(--shadow);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin: 26px 0 28px;
      padding: 12px;
      background: color-mix(in srgb, var(--bg) 86%, transparent);
      border: 1px solid var(--border);
      border-radius: 8px;
      backdrop-filter: blur(16px);
    }

    .search {
      width: 100%;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--fg);
      font: inherit;
      font-size: 15px;
    }

    .category-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--fg);
      padding: 0 12px;
      white-space: nowrap;
    }

    .nav-btn.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .wrong-review-entry {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      margin: 0 0 32px;
      padding: 22px;
      border: 1px solid color-mix(in srgb, var(--accent-2) 44%, var(--border));
      border-left: 5px solid var(--accent-2);
      border-radius: 8px;
      background: color-mix(in srgb, var(--soft-rust) 62%, var(--surface));
    }

    .wrong-review-entry h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
    }

    .wrong-review-entry p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .wrong-review-entry a {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 8px;
      background: var(--accent-2);
      color: #fff;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
    }

    .summary-tile {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--fg);
      cursor: pointer;
      font: inherit;
      text-align: left;
    }

    .summary-tile strong {
      display: block;
      font-size: 15px;
    }

    .summary-tile span {
      color: var(--muted);
      font-size: 13px;
    }

    .summary-count {
      color: var(--accent);
      font-size: 28px;
      font-weight: 900;
    }

    .category {
      margin-top: 34px;
      scroll-margin-top: 94px;
    }

    .category.hidden,
    .card.hidden,
    .subgroup.hidden {
      display: none;
    }

    .category-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .category-heading h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.3;
    }

    .category-heading p {
      margin: 4px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .category-count {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .subgroup {
      margin-top: 22px;
    }

    .subgroup:first-child {
      margin-top: 0;
    }

    .subgroup-heading {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }

    .subgroup-heading::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .subgroup-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .card {
      display: flex;
      min-height: 286px;
      flex-direction: column;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 8px 22px rgba(23, 32, 36, 0.04);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 60%, var(--border));
      box-shadow: var(--shadow);
    }

    .card-tag {
      align-self: flex-start;
      max-width: 100%;
      margin-bottom: 12px;
      padding: 5px 8px;
      border-radius: 6px;
      background: var(--soft-blue);
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.3;
    }

    .card[data-category="print"] .card-tag {
      background: var(--soft-rust);
      color: var(--accent-2);
    }

    .card[data-category="summary"] .card-tag {
      background: var(--soft-green);
      color: var(--accent-3);
    }

    .card-title {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.45;
    }

    .card-desc {
      flex: 1;
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .card-meta span {
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .card-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 14px;
      background: var(--fg);
      color: var(--bg);
      text-decoration: none;
    }

    .card[data-category="print"] .card-btn {
      background: var(--accent-2);
      color: #fff;
    }

    .card[data-category="summary"] .card-btn {
      background: var(--accent-3);
      color: #fff;
    }

    .empty-state {
      display: none;
      margin-top: 28px;
      padding: 28px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      background: color-mix(in srgb, var(--surface) 55%, transparent);
    }

    .empty-state.active {
      display: block;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.58);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      width: min(420px, 100%);
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .modal-content h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .modal-desc {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .qrcode-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: fit-content;
      margin: 0 auto 18px;
      padding: 14px;
      border-radius: 8px;
      background: #fff;
    }

    .manual-link-container {
      margin-bottom: 10px;
      text-align: left;
    }

    .manual-link-container span {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .manual-link-container input {
      width: 100%;
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--fg);
      font: inherit;
      font-size: 12px;
    }

    .copy-link-btn,
    .close-modal-btn {
      width: 100%;
      border: 1px solid var(--border);
      padding: 0 12px;
    }

    .copy-link-btn {
      margin-top: 8px;
      background: var(--accent);
      color: #fff;
    }

    .close-modal-btn {
      margin-top: 8px;
      background: transparent;
      color: var(--fg);
    }

    .toast {
      position: fixed;
      bottom: 22px;
      left: 50%;
      z-index: 1100;
      max-width: min(520px, calc(100% - 32px));
      transform: translateX(-50%) translateY(80px);
      padding: 12px 18px;
      border-radius: 8px;
      background: var(--fg);
      color: var(--bg);
      font-weight: 800;
      opacity: 0;
      transition: transform 220ms ease, opacity 220ms ease;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100% - 24px, 1180px);
        padding-top: 24px;
      }

      .topbar,
      .category-heading {
        display: block;
      }

      .sync-all-btn {
        width: 100%;
        margin-top: 18px;
      }

      .toolbar {
        position: static;
        grid-template-columns: 1fr;
      }

      .category-nav {
        justify-content: stretch;
      }

      .nav-btn {
        flex: 1 1 44%;
      }

      .summary-row {
        grid-template-columns: 1fr;
      }

      .wrong-review-entry {
        grid-template-columns: 1fr;
      }

      .category-count {
        display: inline-block;
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <header>
        <p class="eyebrow">Exam Portal</p>
        <h1 id="portal-title">線上考場入口</h1>
        <p class="subtitle" id="portal-subtitle">依用途整理試卷列印、試題彙整與分年試卷，快速找到要使用的測驗或工具。</p>
      </header>
      <button class="sync-all-btn" id="syncAllBtn" type="button">同步作答進度</button>
    </div>

    <section class="toolbar" aria-label="入口篩選">
      <input class="search" id="portalSearch" type="search" placeholder="搜尋年度、職種、級別或關鍵字" autocomplete="off" />
      <nav class="category-nav" id="categoryNav" aria-label="分類快速切換"></nav>
    </section>

    <section class="summary-row" id="summaryRow" aria-label="分類統計"></section>
    <section class="wrong-review-entry" aria-label="錯題總複習">
      <div>
        <h2>錯題總複習</h2>
        <p>彙整所有試卷中尚未出庫的錯題，集中檢視答案與解析。這裡不會自動出庫，確認掌握後請自行點選「我學會了」。</p>
      </div>
      <a href="wrong-review/">開啟錯題總複習</a>
    </section>
    <div id="categoryRoot"></div>
    <div class="empty-state" id="emptyState">找不到符合條件的項目，請換個關鍵字或切回全部分類。</div>
  </main>

  <script src="portal-data.js"></script>
  <script>
    const CATEGORY_DEFS = [
      {
        key: 'print',
        label: '試卷列印區',
        desc: '整理可列印與另存 PDF 的版面工具。',
        match: exam => hasAny(exam, ['列印', 'PDF', 'print'])
      },
      {
        key: 'summary',
        label: '試題彙整區',
        desc: '跨年度去重題庫、整合題庫與集中練習入口。',
        match: exam => hasAny(exam, ['彙整', '去重', '題庫', '參考資料', 'summary'])
      },
      {
        key: 'yearly',
        label: '分年試卷',
        desc: '依學年度與職種整理的正式、模擬與競賽學科試卷。',
        match: () => true
      }
    ];

    const YEARLY_GROUP_DEFS = [
      {
        key: 'chinese-cooking',
        label: '技藝競賽學科-中餐烹調',
        match: exam => hasAny(exam, ['技藝競賽學科-中餐烹調'])
      },
      {
        key: 'baking',
        label: '技藝競賽學科-烘焙職種',
        match: exam => hasAny(exam, ['技藝競賽學科-烘焙職種'])
      },
      {
        key: 'other',
        label: '其他分年試卷',
        match: () => true
      }
    ];

    let activeCategory = 'all';

    function textOf(exam) {
      return [exam.id, exam.tag, exam.title, exam.desc, exam.href, exam.btnText].filter(Boolean).join(' ');
    }

    function hasAny(exam, words) {
      const source = textOf(exam).toLowerCase();
      return words.some(word => source.includes(String(word).toLowerCase()));
    }

    function categoryOf(exam) {
      return CATEGORY_DEFS.find(def => def.match(exam)).key;
    }

    function groupedExams() {
      const groups = Object.fromEntries(CATEGORY_DEFS.map(def => [def.key, []]));
      const exams = window.PORTAL && Array.isArray(window.PORTAL.exams) ? window.PORTAL.exams : [];
      exams.forEach(exam => groups[categoryOf(exam)].push(exam));
      return groups;
    }

    function renderPortal() {
      if (window.PORTAL && window.PORTAL.meta) {
        const meta = window.PORTAL.meta;
        if (meta.title) document.getElementById('portal-title').textContent = meta.title;
        if (meta.subtitle) document.getElementById('portal-subtitle').textContent = meta.subtitle;
      }

      const groups = groupedExams();
      renderNav(groups);
      renderSummary(groups);
      renderCategories(groups);
      applyFilters();
    }

    function renderNav(groups) {
      const nav = document.getElementById('categoryNav');
      const total = Object.values(groups).reduce((sum, items) => sum + items.length, 0);
      nav.innerHTML = navButton('all', `全部 ${total}`) + CATEGORY_DEFS.map(def => navButton(def.key, `${def.label} ${groups[def.key].length}`)).join('');
      nav.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCategory = btn.dataset.category;
          applyFilters();
          if (activeCategory !== 'all') {
            document.getElementById(`category-${activeCategory}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      });
    }

    function navButton(key, label) {
      return `<button class="nav-btn" type="button" data-category="${key}">${label}</button>`;
    }

    function renderSummary(groups) {
      const row = document.getElementById('summaryRow');
      row.innerHTML = CATEGORY_DEFS.map(def => `
        <button class="summary-tile" type="button" data-category="${def.key}">
          <span><strong>${def.label}</strong><span>${def.desc}</span></span>
          <span class="summary-count">${groups[def.key].length}</span>
        </button>
      `).join('');
      row.querySelectorAll('.summary-tile').forEach(tile => {
        tile.addEventListener('click', () => {
          activeCategory = tile.dataset.category;
          applyFilters();
          document.getElementById(`category-${activeCategory}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
    }

    function renderCategories(groups) {
      const root = document.getElementById('categoryRoot');
      root.innerHTML = CATEGORY_DEFS.map(def => `
        <section class="category" id="category-${def.key}" data-category="${def.key}">
          <div class="category-heading">
            <div>
              <h2>${def.label}</h2>
              <p>${def.desc}</p>
            </div>
            <span class="category-count" data-count-for="${def.key}">${groups[def.key].length} 個項目</span>
          </div>
          ${def.key === 'yearly' ? renderYearlyGroups(groups[def.key]) : renderGrid(groups[def.key], def.key)}
        </section>
      `).join('');
    }

    function renderGrid(exams, category) {
      return `
        <div class="grid">
          ${exams.map(exam => renderCard(exam, category)).join('')}
        </div>
      `;
    }

    function yearlyGroupOf(exam) {
      return YEARLY_GROUP_DEFS.find(def => def.match(exam)).key;
    }

    function renderYearlyGroups(exams) {
      const groups = Object.fromEntries(YEARLY_GROUP_DEFS.map(def => [def.key, []]));
      exams.forEach(exam => groups[yearlyGroupOf(exam)].push(exam));
      return YEARLY_GROUP_DEFS
        .filter(def => groups[def.key].length > 0)
        .map(def => `
          <section class="subgroup" data-yearly-group="${def.key}">
            <div class="subgroup-heading">
              <span>${def.label}</span>
              <span class="subgroup-count" data-subcount-for="${def.key}">${groups[def.key].length} 個項目</span>
            </div>
            <div class="grid">
              ${groups[def.key].map(exam => renderCard(exam, 'yearly')).join('')}
            </div>
          </section>
        `).join('');
    }

    function renderCard(exam, category) {
      const searchable = textOf(exam).replace(/"/g, '&quot;');
      return `
        <article class="card" data-category="${category}" data-search="${searchable}">
          <div class="card-tag">${exam.tag || CATEGORY_DEFS.find(def => def.key === category).label}</div>
          <h3 class="card-title">${exam.title || ''}</h3>
          <p class="card-desc">${exam.desc || ''}</p>
          <div class="card-meta">
            ${exam.time ? `<span>${exam.time}</span>` : ''}
            ${exam.questions ? `<span>${exam.questions}</span>` : ''}
            ${exam.score ? `<span>${exam.score}</span>` : ''}
          </div>
          <a href="${exam.href || '#'}" class="card-btn">${exam.btnText || '進入'}</a>
        </article>
      `;
    }

    function applyFilters() {
      const query = document.getElementById('portalSearch').value.trim().toLowerCase();
      let visibleTotal = 0;

      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.category === activeCategory);
      });

      CATEGORY_DEFS.forEach(def => {
        const section = document.getElementById(`category-${def.key}`);
        let visibleInSection = 0;
        section.querySelectorAll('.card').forEach(card => {
          const categoryMatched = activeCategory === 'all' || activeCategory === def.key;
          const queryMatched = !query || card.dataset.search.toLowerCase().includes(query);
          const visible = categoryMatched && queryMatched;
          card.classList.toggle('hidden', !visible);
          if (visible) visibleInSection++;
        });

        if (def.key === 'yearly') {
          section.querySelectorAll('.subgroup').forEach(group => {
            const visibleInGroup = group.querySelectorAll('.card:not(.hidden)').length;
            group.classList.toggle('hidden', visibleInGroup === 0);
            const count = group.querySelector('[data-subcount-for]');
            if (count) count.textContent = `${visibleInGroup} 個項目`;
          });
        }

        section.classList.toggle('hidden', visibleInSection === 0);
        document.querySelector(`[data-count-for="${def.key}"]`).textContent = `${visibleInSection} 個項目`;
        visibleTotal += visibleInSection;
      });

      document.getElementById('emptyState').classList.toggle('active', visibleTotal === 0);
    }

    function showToast(message) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.className = 'toast';
        document.body.appendChild(toast);
      }
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function checkSyncAll() {
      const hash = window.location.hash;
      if (!hash || !hash.startsWith('#syncAll=')) return;

      const encodedData = hash.substring(9);
      window.history.replaceState('', document.title, window.location.pathname + window.location.search);
      try {
        const payload = JSON.parse(decodeURIComponent(escape(atob(encodedData))));
        let count = 0;
        for (const [key, data] of Object.entries(payload)) {
          const localState = {
            tasks: {},
            quiz: data.q || {},
            textAnswers: {},
            graded: data.g === 1,
            gradedQuestions: {},
            lastSection: ''
          };

          Object.keys(localState.quiz).forEach(qid => {
            localState.gradedQuestions[qid] = true;
          });

          localStorage.setItem(key, JSON.stringify(localState));
          if (data.t !== null) localStorage.setItem(`${key}-time-remaining`, data.t);
          count++;
        }

        if (count > 0) showToast(`已同步 ${count} 份測驗進度`);
      } catch (error) {
        console.error('Restore global progress failed:', error);
        showToast('同步資料解析失敗，請重新產生同步連結');
      }
    }

    function initGlobalSync() {
      document.getElementById('syncAllBtn').addEventListener('click', showGlobalSyncModal);
      document.getElementById('portalSearch').addEventListener('input', applyFilters);
      checkSyncAll();
    }

    function showGlobalSyncModal() {
      const payload = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.includes('progress') || key.endsWith('-time-remaining')) continue;
        try {
          const state = JSON.parse(localStorage.getItem(key));
          const timer = localStorage.getItem(`${key}-time-remaining`);
          if (state && state.quiz && Object.keys(state.quiz).length > 0) {
            payload[key] = {
              q: state.quiz,
              t: timer ? parseInt(timer, 10) : null,
              g: state.graded ? 1 : 0
            };
          }
        } catch (error) {
          console.warn('Skip invalid progress state:', key, error);
        }
      }

      if (Object.keys(payload).length === 0) {
        showToast('目前沒有可同步的作答進度');
        return;
      }

      if (typeof QRCode === 'undefined') {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
        script.onload = () => generateGlobalSyncQR(payload);
        document.head.appendChild(script);
      } else {
        generateGlobalSyncQR(payload);
      }
    }

    function generateGlobalSyncQR(payload) {
      const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
      const syncUrl = `${window.location.origin}${window.location.pathname}#syncAll=${encodedData}`;

      let modal = document.getElementById('syncModal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'syncModal';
        modal.className = 'modal-overlay';
        modal.innerHTML = `
          <div class="modal-content">
            <h3>同步作答進度</h3>
            <p class="modal-desc">用另一台裝置開啟此 QR Code 或連結，即可匯入目前瀏覽器中的測驗作答進度。</p>
            <div id="qrcodeCanvas" class="qrcode-container"></div>
            <div class="manual-link-container">
              <span>同步連結</span>
              <input id="syncUrlInput" type="text" readonly onclick="this.select()">
              <button class="copy-link-btn" id="copyLinkBtn" type="button">複製連結</button>
            </div>
            <button class="close-modal-btn" id="closeModalBtn" type="button">關閉</button>
          </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('closeModalBtn').addEventListener('click', hideGlobalSyncModal);
        document.getElementById('copyLinkBtn').addEventListener('click', copySyncLink);
        modal.addEventListener('click', event => {
          if (event.target === modal) hideGlobalSyncModal();
        });
      }

      document.getElementById('syncUrlInput').value = syncUrl;
      const qrcodeCanvas = document.getElementById('qrcodeCanvas');
      qrcodeCanvas.innerHTML = '';

      new QRCode(qrcodeCanvas, {
        text: syncUrl,
        width: 200,
        height: 200,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });

      modal.classList.add('active');
    }

    function copySyncLink() {
      const input = document.getElementById('syncUrlInput');
      input.select();
      document.execCommand('copy');
      showToast('同步連結已複製');
    }

    function hideGlobalSyncModal() {
      document.getElementById('syncModal')?.classList.remove('active');
    }

    renderPortal();
    initGlobalSync();
  </script>
</body>
</html>
