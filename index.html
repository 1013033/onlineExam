<!doctype html>
<!--
  web/index.html — Mock Exam Platform Portal
  Content controlled by: 114-4-chinese/content.md  (# PORTAL section)
  Build: cd 114-4-chinese && npm run build
-->
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>學術能力模擬檢測 - 線上測驗平台入口</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: oklch(98% 0.005 240);
      --surface: oklch(100% 0 0);
      --surface-2: oklch(96.5% 0.008 245);
      --fg: oklch(16% 0.015 245);
      --muted: oklch(50% 0.015 245);
      --border: oklch(90% 0.006 245);
      --accent: oklch(56% 0.19 255);
      --accent-soft: oklch(94% 0.035 255);
      --accent-2: oklch(62% 0.16 65);
      --r-md: 12px;
      --shadow-lift: 0 10px 30px -15px oklch(20% 0.02 245 / 0.12),
                     0 3px 8px -3px oklch(20% 0.02 245 / 0.04);
      --shadow-hover: 0 18px 40px -10px oklch(20% 0.02 245 / 0.18),
                      0 5px 15px -3px oklch(20% 0.02 245 / 0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: oklch(15% 0.015 250);
        --surface: oklch(19.5% 0.015 250);
        --surface-2: oklch(22.5% 0.015 250);
        --fg: oklch(95% 0.006 250);
        --muted: oklch(65% 0.012 250);
        --border: oklch(26% 0.016 250);
        --accent: oklch(68% 0.16 255);
        --accent-soft: oklch(28% 0.07 255);
        --shadow-lift: 0 12px 35px -15px oklch(0% 0 0 / 0.5),
                       0 4px 10px -3px oklch(0% 0 0 / 0.25);
        --shadow-hover: 0 20px 45px -10px oklch(0% 0 0 / 0.65),
                        0 6px 18px -3px oklch(0% 0 0 / 0.35);
      }
    }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Noto Sans TC", "Nunito", sans-serif;
      margin: 0;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      text-align: center;
      margin-bottom: 48px;
      max-width: 600px;
    }
    h1 {
      font-size: 32px;
      font-weight: 900;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 1000px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 28px;
      box-shadow: var(--shadow-lift);
      display: flex;
      flex-direction: column;
      transition: all 250ms ease;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }
    .card-tag {
      font-size: 11px;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 12px;
      line-height: 1.4;
    }
    .card-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
      flex: 1;
    }
    .card-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .card-btn {
      display: inline-block;
      text-align: center;
      background: var(--accent);
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      transition: all 150ms ease;
    }
    .card-btn:hover {
      background: color-mix(in oklab, var(--accent) 80%, black);
      text-decoration: none;
    }
    .card.placeholder {
      border-style: dashed;
      border-width: 2px;
      background: transparent;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
    }
    .card.placeholder:hover {
      border-color: var(--muted);
      transform: none;
      box-shadow: var(--shadow-lift);
    }
    .placeholder-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.6;
    }
    .placeholder-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header id="portal-header">
    <h1 id="portal-title">學術能力模擬檢測入口</h1>
    <div class="subtitle" id="portal-subtitle">歡迎來到模擬考試線上平台。</div>
  </header>

  <div class="grid" id="exam-grid">
    <!-- populated by renderPortal() -->
  </div>

  <!-- portal-data.js is auto-generated by: cd 114-4-chinese && npm run build -->
  <script src="portal-data.js"></script>
  <script>
    function renderPortal() {
      // Render header from PORTAL data if available
      if (window.PORTAL && window.PORTAL.meta) {
        const m = window.PORTAL.meta;
        if (m.title)    document.getElementById('portal-title').textContent    = m.title;
        if (m.subtitle) document.getElementById('portal-subtitle').textContent = m.subtitle;
      }

      const grid = document.getElementById('exam-grid');
      grid.innerHTML = '';

      const exams = window.PORTAL && window.PORTAL.exams ? window.PORTAL.exams : [];

      // Render exam cards
      exams.forEach(exam => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-tag">${exam.tag || ''}</div>
          <h2 class="card-title">${exam.title || ''}</h2>
          <p class="card-desc">${exam.desc || ''}</p>
          <div class="card-meta">
            ${exam.time      ? `<span>⏱️ ${exam.time}</span>` : ''}
            ${exam.questions ? `<span>📝 ${exam.questions}</span>` : ''}
            ${exam.score     ? `<span>🎯 ${exam.score}</span>` : ''}
          </div>
          <a href="${exam.href || '#'}" class="card-btn">${exam.btnText || '進入考場'}</a>
        `;
        grid.appendChild(card);
      });

      // Always append placeholder card for future exams
      const placeholder = document.createElement('div');
      placeholder.className = 'card placeholder';
      placeholder.innerHTML = `
        <div class="placeholder-icon">📥</div>
        <div class="placeholder-title">未來新增試卷</div>
        <p style="font-size: 13px; color: var(--muted); margin-top: 8px; margin-bottom: 0;">在此目錄下新增其他學科與試卷資料夾，即可在此面板中進行串接與擴展。</p>
      `;
      grid.appendChild(placeholder);
    }

    renderPortal();
  </script>
</body>
</html>
