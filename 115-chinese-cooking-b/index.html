<head>
  <script>

    if (window.location.pathname.endsWith('/115-chinese-cooking-b')) {
      window.location.replace(window.location.pathname + '/' + window.location.search + window.location.hash);
    }
  </script>
  <meta charset="utf-8" />

<body>

    <!-- ===== sidebar (fixed left, navigation + progress) ===== -->

  </div>

  <!-- ===== data load order matters: course-data.js MUST load before render ===== -->
  <script src="course-data.js"></script>

  <script>
  /* ============================================================
   * Storage / state
   * ============================================================ */
  const STORE_KEY = (window.COURSE && window.COURSE.meta && window.COURSE.meta.storeKey)
    ? window.COURSE.meta.storeKey
    : '115-chinese-cooking-b-progress-v2';
  const WRONG_BOOK_KEY = `${STORE_KEY}-wrong-book-v1`;

  function compressState() {
    const timeVal = localStorage.getItem(`${STORE_KEY}-time-remaining`) || (window.COURSE && window.COURSE.meta && window.COURSE.meta.timerSeconds) || 3600;
    const payload = {
      version: 2,
      state: {
        tasks: state.tasks || {},
        quiz: state.quiz || {},
        textAnswers: state.textAnswers || {},
        graded: !!state.graded,
        gradedQuestions: state.gradedQuestions || {},
        lastSection: state.lastSection || '',
        lastQuestion: state.lastQuestion || ''
      },
      timeRemaining: parseInt(timeVal, 10),
      wrongBook: wrongBook || {}
    };
    return `v2:${encodeURIComponent(JSON.stringify(payload))}`;
  }

  function decompressState(str) {
    try {
      const decoded = decodeURIComponent(str);
      if (decoded.startsWith('v2:')) {
        const payload = JSON.parse(decodeURIComponent(decoded.slice(3)));
        const parsedTime = Number.isFinite(payload.timeRemaining) ? payload.timeRemaining : parseInt(payload.timeRemaining, 10);
        return {
          state: {
            tasks: (payload.state && payload.state.tasks) || {},
            quiz: (payload.state && payload.state.quiz) || {},
            textAnswers: (payload.state && payload.state.textAnswers) || {},
            graded: !!(payload.state && payload.state.graded),
            gradedQuestions: (payload.state && payload.state.gradedQuestions) || {},
            lastSection: (payload.state && payload.state.lastSection) || '',
            lastQuestion: (payload.state && payload.state.lastQuestion) || ''
          },
          timeRemaining: Number.isFinite(parsedTime) ? parsedTime : null,
          wrongBook: payload.wrongBook || {}
        };
      }

      const parts = decoded.split(':');
      if (parts.length < 3) return null;
      const [answersStr, timeStr, gradedStr] = parts;

      const quizItems = window.COURSE.quiz || [];
      const quiz = {};
      for (let i = 0; i < quizItems.length; i++) {
        const char = answersStr[i];
        if (char !== '_' && char !== undefined) {
          quiz[quizItems[i].id] = parseInt(char, 10);
        }
      }

      const parsedState = {
        tasks: {},
        quiz: quiz,
        textAnswers: {},
        graded: gradedStr === '1',
        gradedQuestions: {},
        lastSection: '',
        lastQuestion: ''
      };

      // Auto check tasks based on answers
      quizItems.forEach(item => {
        if (quiz[item.id] !== undefined) {
          const unitId = item.sourceUnit.split('.')[1];
          parsedState.tasks[`d1-${unitId}-t1`] = true;
          parsedState.gradedQuestions[item.id] = true;
        }
      });

      return {
        state: parsedState,
        timeRemaining: parseInt(timeStr, 10),
        wrongBook: {}
      };
    } catch (e) {
      return null;
    }
  }

  const store = {
    load() {
      // Check for sync hash parameter first
      const hash = window.location.hash;
      if (hash && hash.startsWith('#sync=')) {
        const syncData = hash.substring(6);
        // Clear hash immediately so refresh won't overwrite progress
        window.history.replaceState("", document.title, window.location.pathname + window.location.search);
        try {
          const decompressed = decompressState(syncData);
          if (decompressed) {
            localStorage.setItem(STORE_KEY, JSON.stringify(decompressed.state));
            if (decompressed.timeRemaining !== null) {
              localStorage.setItem(`${STORE_KEY}-time-remaining`, decompressed.timeRemaining);
            }
            if (decompressed.wrongBook) {
              localStorage.setItem(WRONG_BOOK_KEY, JSON.stringify(decompressed.wrongBook));
            }
            window.__syncLoaded = true;
            return decompressed.state;
          }
        } catch (e) {
          console.error("Decompress sync state failed:", e);
        }
      }

      try {
        const loaded = JSON.parse(localStorage.getItem(STORE_KEY)) || {};
        return {
          tasks: loaded.tasks || {},
          quiz: loaded.quiz || {},
          textAnswers: loaded.textAnswers || {},
          graded: loaded.graded || false,
          gradedQuestions: loaded.gradedQuestions || {},
          lastSection: loaded.lastSection || '',
          lastQuestion: loaded.lastQuestion || ''
        };
      }
      catch {
        return { tasks: {}, quiz: {}, textAnswers: {}, graded: false, gradedQuestions: {}, lastSection: '', lastQuestion: '' };
      }
    },
    save(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); },
    reset() {
      localStorage.removeItem(STORE_KEY);
      localStorage.removeItem(WRONG_BOOK_KEY);
      localStorage.removeItem(`${STORE_KEY}-time-remaining`);
      location.reload();
    }
  };
  let state = store.load();
  state.gradedQuestions = state.gradedQuestions || {};

  const wrongBookStore = {
    load() {
      try {
        return JSON.parse(localStorage.getItem(WRONG_BOOK_KEY)) || {};
      } catch {
        return {};
      }
    },
    save(book) {
      localStorage.setItem(WRONG_BOOK_KEY, JSON.stringify(book));
    },
    reset() {
      localStorage.removeItem(WRONG_BOOK_KEY);
    }
  };
  let wrongBook = wrongBookStore.load();
  let wrongPracticeMode = false;
  let wrongPracticeState = { quiz: {}, gradedQuestions: {} };

  /* ============================================================
   * Tiny DOM helper (no framework, no innerHTML for user content)
   * ============================================================ */
  const el = (tag, attrs = {}, ...children) => {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') node.className = v;
      else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
      else if (v !== false && v != null) node.setAttribute(k, v);
    }
    for (const c of children.flat()) {
      if (c == null || c === false) continue;
      node.append(c instanceof Node ? c : document.createTextNode(String(c)));
    }
    return node;
  };
  const clear = (node) => { while (node.firstChild) node.removeChild(node.firstChild); };

  /* ============================================================
   * Inline markdown (safe — no innerHTML for user content)
   * Supports: **bold**, [text](url)
   * ============================================================ */
  function inlineMarkdown(str) {
    if (!str) return document.createDocumentFragment();
    const frag = document.createDocumentFragment();
    const parts = str.split(/(\*\*[^*]+\*\*|\[[^\]]+\]\([^)]+\))/g);
    parts.forEach(part => {
      if (part.startsWith('**') && part.endsWith('**')) {
        const b = document.createElement('strong');
        b.textContent = part.slice(2, -2);
        frag.append(b);
      } else if (part.startsWith('[') && part.includes('](')) {
        const match = part.match(/\[([^\]]+)\]\(([^)]+)\)/);
        if (match) {
          const a = document.createElement('a');
          a.textContent = match[1];
          a.href = match[2];
          a.target = '_blank';
          a.rel = 'noopener';
          frag.append(a);
        } else {
          frag.append(document.createTextNode(part));
        }
      } else {
        frag.append(document.createTextNode(part));
      }
    });
    return frag;
  }

  /* ============================================================
   * Render: concept block
   * ============================================================ */
  function renderConcept(c) {
    const w = el('div', { class: 'concept' });
    if (c.heading) w.append(el('div', { class: 'concept-heading' }, c.heading));
    if (c.body) w.append(el('div', { class: 'concept-body' }, inlineMarkdown(c.body)));
    if (c.illustration) w.append(renderIllustration(c.illustration));
    if (c.list && c.list.length) {
      const kv = el('div', { class: 'kv' });
      c.list.forEach(([k, v]) => {
        kv.append(el('div', { class: 'kv-key' }, inlineMarkdown(k)));
        kv.append(el('div', { class: 'kv-val' }, inlineMarkdown(v)));
      });
      w.append(kv);
    }
    if (c.table) {
      const t = el('table', { class: 't' });
      const thead = el('thead');
      thead.append(el('tr', {}, ...c.table.head.map(h => el('th', {}, inlineMarkdown(h)))));
      t.append(thead);
      const tb = el('tbody');
      c.table.rows.forEach(r => tb.append(el('tr', {}, ...r.map(cell => el('td', {}, inlineMarkdown(cell))))));
      t.append(tb);
      w.append(t);
    }
    if (c.note) w.append(el('div', { class: 'note' }, inlineMarkdown(c.note)));
    return w;
  }

  /* ============================================================
   * Render: task list (id is localStorage key — never rename)
   * ============================================================ */
  function renderTaskList(tasks) {
    const list = el('ul', { class: 'task-list' });
    tasks.forEach(t => {
      const li = el('li', {
        class: 'task-item' + (state.tasks[t.id] ? ' done' : ''),
        'data-task-id': t.id
      });
      li.append(el('div', { class: 'task-checkbox' }, '✓'));
      li.append(el('div', { class: 'task-label' }, t.label));
      li.addEventListener('click', () => toggleTask(t.id, li));
      list.append(li);
    });
    return list;
  }
  function toggleTask(id, li) {
    if (state.tasks[id]) delete state.tasks[id];
    else state.tasks[id] = true;
    li.classList.toggle('done');
    store.save(state);
    updateProgressUI();
  }

  /* ============================================================
   * Render: material list (3-place sync)
   * ============================================================ */
  function renderMaterialList(items) {
    const w = el('div', { class: 'materials' });
    items.forEach(m => {
      const row = el('div', { class: 'material-row' });
      row.append(el('div', { class: 'material-tag' }, m.type));
      const center = el('div', {});
      const url = getMaterialUrl(m.name, m.type);
      if (url) {
        const link = el('a', { class: 'material-name', href: '#', onclick: (e) => { e.preventDefault(); openViewer(url); } }, m.name);
        center.append(link);
      } else {
        center.append(el('div', { class: 'material-name' }, m.name));
      }
      if (m.desc) center.append(el('div', { class: 'material-desc' }, m.desc));
      row.append(center);
      row.append(el('div', { class: 'material-meta' }, 'course-package/materials/'));
      w.append(row);
    });
    return w;
  }

  /* ============================================================
   * Material URL router
   * 3-place sync: this router + course-data.js:materials[] + actual file on disk
   * ============================================================ */
  function getMaterialUrl(name, type) {
    const base = 'course-package/materials';
    if (name.includes('chinese-cooking-b') || name.includes('中餐葷食乙級')) {
      return `${base}/chinese-cooking-b-exam.md`;
    }
    return null;
  }

  /* ============================================================
   * Render: illustration (dummy SVG generation or fallback)
   * ============================================================ */
  function renderIllustration(name) {
    const wrap = el('div', { class: 'illustration' });
    const canvasMock = el('div', {
      style: 'background: var(--surface-2); border: 2px dashed var(--border-strong); padding: 40px; border-radius: var(--r-md); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;'
    });

    let icon = '🍳';
    let desc = '中餐烹飪學科測驗示意圖';
    if (name.includes('culture')) {
      icon = '🏮';
      desc = '飲食文化與餐飲管理';
    } else if (name.includes('ingredients')) {
      icon = '🥬';
      desc = '食材與營養知識（豬肉部位、蔬菜別稱、保存）';
    } else if (name.includes('methods')) {
      icon = '🔥';
      desc = '烹飪技法與專業器具（菜系特色、火候、保溫）';
    }

    canvasMock.append(el('div', { style: 'font-size: 48px;' }, icon));
    canvasMock.append(el('div', { style: 'font-weight: 800; font-size: 14px; color: var(--fg);' }, desc));
    canvasMock.append(el('div', { style: 'font-size: 12px; color: var(--muted);' }, `[示意圖: ${name}]`));
    wrap.append(canvasMock);
    return wrap;
  }

  /* ============================================================
   * Render: unit accordion
   * ============================================================ */
  function renderUnit(day, u) {
    const det = el('details', { class: 'unit', id: `${day.id}-${u.id}` });
    if (u.id === 'u-1') det.open = true;

    const sum = el('summary', {});
    const titleWrap = el('div', { class: 'unit-title-group' });
    titleWrap.append(el('div', { class: 'unit-title' }, u.title));

    const metaDiv = el('div', { class: 'unit-meta' });
    if (u.subtitle) metaDiv.append(el('span', {}, u.subtitle));
    metaDiv.append(el('span', {}, `建議用時: ${u.time}`));
    titleWrap.append(metaDiv);

    sum.append(titleWrap);
    sum.append(el('span', { class: 'unit-progress-pill', id: `pill-${u.id}` }, '0 / 0'));
    det.append(sum);

    const body = el('div', { class: 'unit-body' });

    if (u.goals?.length) {
      body.append(el('h4', {}, '學習與考核目標'));
      const ul = el('ul', { class: 'list' });
      u.goals.forEach(g => ul.append(el('li', {}, g)));
      body.append(ul);
    }
    if (u.illustrations?.length) {
      const hero = u.illustrations.find(i => i.kind === 'hero');
      if (hero) body.append(renderIllustration(hero.name));
    }
    if (u.concepts?.length) {
      body.append(el('h4', {}, '觀念與技巧指引'));
      u.concepts.forEach(c => body.append(renderConcept(c)));
    }
    if (u.tasks?.length) {
      body.append(el('h4', {}, '任務清單'));
      body.append(renderTaskList(u.tasks));
    }
    if (u.materials?.length) {
      body.append(el('h4', {}, '單元相關素材'));
      body.append(renderMaterialList(u.materials));
    }
    det.append(body);
    return det;
  }

  /* ============================================================
   * Render: day section (hero + units)
   * ============================================================ */
  function renderDay(dayId) {
    const d = window.COURSE[dayId];
    if (!d) return null;
    const root = el('section', { class: 'chapter', id: dayId, 'data-section-id': dayId });

    const hero = el('div', { class: 'day-hero' });
    const meta = window.COURSE.meta.days.find(x => x.id === dayId);
    hero.append(el('div', { class: 'day-hero-numeral' }, `M${meta?.n || ''}`));
    const heroMeta = el('div', { class: 'day-hero-meta' });
    heroMeta.append(el('div', { class: 'eyebrow' }, d.date || ''));
    heroMeta.append(el('h2', {}, d.title));
    if (d.learningGoal) heroMeta.append(el('div', { class: 'lead' }, d.learningGoal));
    hero.append(heroMeta);
    root.append(hero);

    d.units?.forEach(u => root.append(renderUnit(d, u)));
    return root;
  }

  /* ============================================================
   * Render: overview (course meta)
   * ============================================================ */
  function renderOverview() {
    const root = el('section', { class: 'chapter', id: 'overview', 'data-section-id': 'overview' });
    root.append(el('span', { class: 'eyebrow' }, window.COURSE.meta.program || ''));
    root.append(el('h1', {}, window.COURSE.meta.title));
    if (window.COURSE.meta.subtitle) root.append(el('div', { class: 'lead' }, window.COURSE.meta.subtitle));

    // Info grid
    const grid = el('div', { class: 'kv' });
    grid.append(el('div', { class: 'kv-key' }, '主辦單位'));
    grid.append(el('div', { class: 'kv-val' }, window.COURSE.meta.organizer || ''));
    grid.append(el('div', { class: 'kv-key' }, '考試時間'));
    grid.append(el('div', { class: 'kv-val' }, window.COURSE.meta.format || ''));
    grid.append(el('div', { class: 'kv-key' }, '作答說明'));
    const instructions = (window.COURSE.meta && window.COURSE.meta.instructions)
      ? window.COURSE.meta.instructions
      : '單選題共 50 題，每題 2 分，滿分 100 分，無倒扣。作答完成後，點擊最下方「送出答案與評分」按鈕可獲得即時分數及詳解。';
    grid.append(el('div', { class: 'kv-val' }, instructions));
    root.append(grid);

    // Objectives
    root.append(el('h3', {}, '線上測驗學習目標'));
    const ul = el('ul', { class: 'list' });
    window.COURSE.meta.objectives.forEach(obj => ul.append(el('li', {}, obj)));
    root.append(ul);

    // Schedule Table
    if (window.COURSE.day1 && window.COURSE.day1.schedule) {
      root.append(el('h3', {}, '考科時程與配置'));
      const sched = el('table', { class: 't' });
      const thead = el('thead');
      thead.append(el('tr', {}, el('th', {}, '建議時間'), el('th', {}, '考科單元'), el('th', {}, '考核重點')));
      sched.append(thead);
      const tbody = el('tbody');
      window.COURSE.day1.schedule.forEach(([t, seg, f]) => {
        tbody.append(el('tr', {}, el('td', {}, t), el('td', {}, seg), el('td', {}, f)));
      });
      sched.append(tbody);
      root.append(sched);
    }

    return root;
  }

  /* ============================================================
   * Render: materials overview
   * ============================================================ */
  function renderMaterials() {
    const items = window.COURSE.materials || [];
    if (!items.length) return null;
    const root = el('section', { class: 'chapter', id: 'materials-overview', 'data-section-id': 'materials-overview' });
    root.append(el('span', { class: 'eyebrow' }, '素材下載'));
    root.append(el('h2', {}, '試卷與相關檔案下載'));
    root.append(renderMaterialList(items));
    return root;
  }

    function getWrongBookItems() {
    const quizItems = window.COURSE.quiz || [];
    return quizItems.filter(item => item.type !== 'text' && wrongBook[item.id]);
  }

  function getWrongBookCount() {
    return Object.keys(wrongBook).length;
  }

  function renderWrongBookPanel(count) {
    const panel = el('div', { class: 'wrong-book-panel', id: 'wrongBookPanel' });
    const meta = el('div', { class: 'wrong-book-meta' });
    meta.append(el('div', { class: 'wrong-book-title' }, wrongPracticeMode ? '錯題重練中' : '錯題庫'));
    meta.append(el('div', { class: 'wrong-book-desc', id: 'wrongBookDesc' }, getWrongBookSummaryText(count)));

    const actions = el('div', { class: 'wrong-book-actions' });
    actions.append(el('button', {
      class: 'wrong-book-btn',
      id: 'wrongPracticeBtn',
      type: 'button',
      disabled: count === 0 && !wrongPracticeMode,
      onclick: toggleWrongPracticeMode
    }, wrongPracticeMode ? '返回完整試卷' : '錯題重練'));
    actions.append(el('button', {
      class: 'wrong-book-btn secondary',
      id: 'clearWrongBookBtn',
      type: 'button',
      disabled: count === 0,
      onclick: clearWrongBook
    }, '清空錯題庫'));

    panel.append(meta, actions);
    return panel;
  }

  function getWrongBookSummaryText(count = getWrongBookCount()) {
    if (count === 0) return '目前沒有錯題。答錯的選擇題會自動加入，重練連續答對 2 次後自動出庫。';
    return `目前 ${count} 題待重練。每題連續答對 2 次會自動出庫；答錯會歸零重新累計。`;
  }

  function updateWrongBookSummary() {
    const count = getWrongBookCount();
    const desc = document.getElementById('wrongBookDesc');
    if (desc) desc.textContent = getWrongBookSummaryText(count);
    const practiceBtn = document.getElementById('wrongPracticeBtn');
    if (practiceBtn) practiceBtn.disabled = count === 0 && !wrongPracticeMode;
    const clearBtn = document.getElementById('clearWrongBookBtn');
    if (clearBtn) clearBtn.disabled = count === 0;
  }

  function toggleWrongPracticeMode() {
    wrongPracticeMode = !wrongPracticeMode;
    wrongPracticeState = { quiz: {}, gradedQuestions: {} };
    rerenderQuizSection();
    showToast(wrongPracticeMode ? '已進入錯題重練。' : '已返回完整試卷。');
  }

  function clearWrongBook() {
    wrongBook = {};
    wrongBookStore.reset();
    wrongPracticeMode = false;
    wrongPracticeState = { quiz: {}, gradedQuestions: {} };
    rerenderQuizSection();
    showToast('錯題庫已清空。');
  }

  function rerenderQuizSection() {
    const oldQuiz = document.getElementById('quiz');
    const newQuiz = renderQuiz();
    if (oldQuiz && newQuiz) {
      oldQuiz.replaceWith(newQuiz);
      updateProgressUI();
    }
  }

  function hasChoiceAnswer(item, given) {
    if (!item) return false;
    if (item.type === 'single') return given !== undefined;
    if (item.type === 'multiple') return Array.isArray(given) && given.length > 0;
    return false;
  }

  function recordChoiceResult(item, isCorrect, isPractice) {
    if (!item || item.type === 'text') return false;

    const existing = wrongBook[item.id] || {};
    if (isPractice) {
      if (isCorrect) {
        const nextStreak = (existing.correctStreak || 0) + 1;
        if (nextStreak >= 2) {
          delete wrongBook[item.id];
          wrongBookStore.save(wrongBook);
          updateWrongBookSummary();
          showToast('已連續答對 2 次，這題已從錯題庫移除。');
          return true;
        }
        wrongBook[item.id] = {
          ...existing,
          correctStreak: nextStreak,
          lastPracticedAt: new Date().toISOString()
        };
        wrongBookStore.save(wrongBook);
        updateWrongBookSummary();
        showToast(`答對了！此題連續答對 ${nextStreak} / 2 次。`);
        return false;
      }

      wrongBook[item.id] = {
        ...existing,
        correctStreak: 0,
        missedAt: existing.missedAt || new Date().toISOString(),
        lastPracticedAt: new Date().toISOString()
      };
      wrongBookStore.save(wrongBook);
      updateWrongBookSummary();
      showToast('本題仍在錯題庫，連續答對次數已歸零。');
      return false;
    }

    if (!isCorrect) {
      wrongBook[item.id] = {
        ...existing,
        correctStreak: 0,
        missedAt: existing.missedAt || new Date().toISOString()
      };
      wrongBookStore.save(wrongBook);
      updateWrongBookSummary();
    }
    return false;
  }

  /* ============================================================
   * Render: Interactive Quiz Platform
   * ============================================================ */
  function renderQuiz() {
    const items = window.COURSE.quiz || [];
    if (!items.length) return null;
    const wrongItems = getWrongBookItems();
    const visibleItems = wrongPracticeMode ? wrongItems : items;

    const root = el('section', { class: 'chapter', id: 'quiz', 'data-section-id': 'quiz' });
    root.append(el('span', { class: 'eyebrow' }, '測驗作答區'));
    const uniqueIds = new Set(items.map(item => item.id.replace(/[a-z]/g, '')));
    root.append(el('h2', {}, `測驗與即時評估（共 ${uniqueIds.size} 題）`));
    root.append(el('p', { class: 'lead' }, wrongPracticeMode
      ? '錯題重練只會顯示目前錯題庫內的選擇題。每題連續答對 2 次後會自動從錯題庫移除。'
      : '請在此進行線上答題。選擇題會自動批改，混合題的手寫部分您可以點擊「對照參考答案」進行自我批改與核對。'));

    const wrongPanel = renderWrongBookPanel(wrongItems.length);
    root.append(wrongPanel);

    // Score Card
    const scoreCard = el('div', { class: 'score-summary-card', id: 'scoreCard' });
    root.append(scoreCard);

    const container = el('div', { class: 'quiz-container' });

    if (wrongPracticeMode && !visibleItems.length) {
      container.append(el('div', { class: 'wrong-book-empty' }, '目前沒有錯題。一般測驗答錯的題目會自動加入錯題庫。'));
    }

    visibleItems.forEach((item, index) => {
      const answerSource = wrongPracticeMode ? wrongPracticeState.quiz : state.quiz;
      const gradedSource = wrongPracticeMode ? wrongPracticeState.gradedQuestions : state.gradedQuestions;
      const isGraded = wrongPracticeMode ? !!gradedSource[item.id] : (state.graded || (gradedSource && gradedSource[item.id]));

      // Determine card classes based on correctness if already graded
      const cardClasses = ['quiz-card'];
      if (isGraded) {
        if (item.type === 'single') {
          const given = answerSource[item.id];
          if (given === item.answer) {
            cardClasses.push('correct');
          } else {
            cardClasses.push('incorrect');
          }
        } else if (item.type === 'multiple') {
          const given = answerSource[item.id] || [];
          let k = 0;
          const optionCount = item.options ? item.options.length : 4;
          for (let oIdx = 0; oIdx < optionCount; oIdx++) {
            const chosen = given.includes(oIdx);
            const shouldChoose = item.answer.includes(oIdx);
            if (chosen !== shouldChoose) k++;
          }
          if (k === 0) cardClasses.push('correct');
          else cardClasses.push('incorrect');
        }
      }

      const card = el('div', {
        class: cardClasses.join(' '),
        id: `card-${item.id}`,
        'data-type': item.type,
        'data-graded': isGraded ? 'true' : 'false'
      });

      const header = el('div', { class: 'quiz-header' });
      header.append(el('div', { class: 'quiz-tag' }, item.type === 'single' ? '單選題' : item.type === 'multiple' ? '多選題' : '混合/非選擇題'));
      card.append(header);

      card.append(el('div', { class: 'quiz-question' }, item.q));

      if (item.type === 'single') {
        const opts = el('div', { class: 'quiz-options' });
        item.options.forEach((optText, optIdx) => {
          const isSelected = answerSource[item.id] === optIdx;
          const isCorrect = item.answer === optIdx;
          const optEl = el('div', {
            class: 'quiz-option' + (isSelected ? ' selected' : '') + (isGraded && isCorrect ? ' correct-answer' : ''),
            onclick: () => selectSingleOption(item.id, optIdx)
          });
          optEl.append(el('div', { class: 'quiz-option-marker' }));
          optEl.append(el('span', {}, optText));
          opts.append(optEl);
        });
        card.append(opts);
      }
      else if (item.type === 'multiple') {
        const opts = el('div', { class: 'quiz-options' });
        const currentSelections = answerSource[item.id] || [];
        item.options.forEach((optText, optIdx) => {
          const isSelected = currentSelections.includes(optIdx);
          const isCorrect = item.answer.includes(optIdx);
          const optEl = el('div', {
            class: 'quiz-option' + (isSelected ? ' selected' : '') + (isGraded && isCorrect ? ' correct-answer' : ''),
            onclick: () => toggleMultipleOption(item.id, optIdx)
          });
          optEl.append(el('div', { class: 'quiz-option-marker' }));
          optEl.append(el('span', {}, optText));
          opts.append(optEl);
        });
        card.append(opts);

        // Add a "Confirm Answer" button for multi-choice questions
        const confirmBtn = el('button', {
          class: 'confirm-multi-btn',
          id: `confirm-${item.id}`,
          style: 'margin-top: 12px; padding: 8px 16px; font-size: 14px; font-weight: 700; border-radius: var(--r-sm); background: var(--accent); color: white; border: none; cursor: pointer;' + (isGraded ? ' display: none;' : ''),
          onclick: () => confirmMultipleAnswer(item.id)
        }, '確認選項並看解析');
        card.append(confirmBtn);
      }
      else if (item.type === 'text') {
        const textGroup = el('div', { class: 'quiz-text-input' });

        item.subQuestions.forEach((sub, subIdx) => {
          const savedAnswer = (state.textAnswers[item.id] && state.textAnswers[item.id][subIdx]) || '';

          textGroup.append(el('div', { style: 'font-weight: 700; font-size: 14px; margin-bottom: 4px;' }, sub.label));

          const textareaGroup = el('div', { class: 'quiz-textarea-group' });
          const textarea = el('textarea', {
            class: 'quiz-textarea',
            placeholder: sub.placeholder || '請在此輸入您的作答...',
            oninput: (e) => handleTextAnswerInput(item.id, subIdx, e.target, item.id + '-' + subIdx + '-count')
          }, savedAnswer);

          textareaGroup.append(textarea);

          const charCount = el('div', { class: 'char-counter', id: `${item.id}-${subIdx}-count` }, `${savedAnswer.length} 字`);
          textareaGroup.append(charCount);
          textGroup.append(textareaGroup);
        });

        // Rubric reveal button
        const rubricBtn = el('button', {
          class: 'rubric-btn',
          type: 'button',
          onclick: () => toggleRubric(item.id)
        }, '顯示參考答案與評分規準');
        textGroup.append(rubricBtn);

        const rubricBox = el('div', { class: 'rubric-box', id: `rubric-${item.id}` });
        rubricBox.append(el('div', { class: 'rubric-title' }, '【參考解答與評分標準】'));
        rubricBox.append(el('div', { style: 'white-space: pre-wrap;' }, item.explanation));
        textGroup.append(rubricBox);

        card.append(textGroup);
      }

      // Add explanation (shown when graded for choice questions)
      if (item.type !== 'text' && item.explanation) {
        card.append(el('div', { class: 'explanation-box' }, item.explanation));
      }

      container.append(card);
    });

    root.append(container);

    // Grading Actions Buttons
    const actions = el('div', { class: 'quiz-actions' });
    actions.append(el('button', { class: 'grade-btn', type: 'button', onclick: gradeQuiz }, wrongPracticeMode ? '送出本次錯題重練' : '送出答案與評分'));
    actions.append(el('button', { class: 'reset-btn', type: 'button', onclick: () => store.reset() }, '清除所有紀錄'));
    root.append(actions);

    return root;
  }

  /* ============================================================
   * Quiz Logic Handlers
   * ============================================================ */
  function rememberLastQuestion(itemId) {
    if (wrongPracticeMode || !itemId) return;
    state.lastSection = 'quiz';
    state.lastQuestion = itemId;
  }


  function selectSingleOption(itemId, optIdx) {
    const quizState = wrongPracticeMode ? wrongPracticeState.quiz : state.quiz;
    const gradedState = wrongPracticeMode ? wrongPracticeState.gradedQuestions : state.gradedQuestions;
    if ((!wrongPracticeMode && state.graded) || gradedState[itemId]) return; // locked once graded
    quizState[itemId] = optIdx;
    gradedState[itemId] = true;
    rememberLastQuestion(itemId);
    if (!wrongPracticeMode) store.save(state);

    gradeSingleQuestion(itemId, optIdx, wrongPracticeMode);
    updateProgressUI();
  }

  function toggleMultipleOption(itemId, optIdx) {
    const quizState = wrongPracticeMode ? wrongPracticeState.quiz : state.quiz;
    const gradedState = wrongPracticeMode ? wrongPracticeState.gradedQuestions : state.gradedQuestions;
    if ((!wrongPracticeMode && state.graded) || gradedState[itemId]) return; // locked once graded
    if (!quizState[itemId]) quizState[itemId] = [];

    const idxInArr = quizState[itemId].indexOf(optIdx);
    if (idxInArr > -1) quizState[itemId].splice(idxInArr, 1);
    else quizState[itemId].push(optIdx);

    if (!wrongPracticeMode) store.save(state);

    // Re-render options
    const card = document.getElementById(`card-${itemId}`);
    const options = card.querySelectorAll('.quiz-option');
    options.forEach((opt, idx) => {
      opt.classList.toggle('selected', quizState[itemId].includes(idx));
    });
    updateProgressUI();
  }

  function confirmMultipleAnswer(itemId) {
    const quizState = wrongPracticeMode ? wrongPracticeState.quiz : state.quiz;
    const gradedState = wrongPracticeMode ? wrongPracticeState.gradedQuestions : state.gradedQuestions;
    if ((!wrongPracticeMode && state.graded) || gradedState[itemId]) return;

    const selections = quizState[itemId] || [];
    if (selections.length === 0) {
      showToast('請先選擇至少一個選項！');
      return;
    }

    gradedState[itemId] = true;
    rememberLastQuestion(itemId);
    if (!wrongPracticeMode) store.save(state);

    gradeMultipleQuestion(itemId, wrongPracticeMode);
    updateProgressUI();
  }

  function gradeSingleQuestion(itemId, optIdx, isPractice = false) {
    const card = document.getElementById(`card-${itemId}`);
    if (!card) return;

    card.setAttribute('data-graded', 'true');

    const item = window.COURSE.quiz.find(x => x.id === itemId);
    if (!item) return;

    const correct = item.answer;
    const isCorrect = optIdx === correct;
    if (isCorrect) {
      card.classList.add('correct');
    } else {
      card.classList.add('incorrect');
    }
    const removedFromWrongBook = recordChoiceResult(item, isCorrect, isPractice);

    const options = card.querySelectorAll('.quiz-option');
    options.forEach((opt, idx) => {
      opt.classList.toggle('selected', idx === optIdx);
      opt.classList.toggle('correct-answer', idx === correct);
    });

    if ((removedFromWrongBook || isPractice) && wrongPracticeMode) {
      setTimeout(() => {
        wrongPracticeState = { quiz: {}, gradedQuestions: {} };
        rerenderQuizSection();
      }, 700);
    }
  }

  function gradeMultipleQuestion(itemId, isPractice = false) {
    const card = document.getElementById(`card-${itemId}`);
    if (!card) return;

    card.setAttribute('data-graded', 'true');

    const item = window.COURSE.quiz.find(x => x.id === itemId);
    if (!item) return;

    const given = wrongPracticeMode ? (wrongPracticeState.quiz[itemId] || []) : (state.quiz[itemId] || []);
    const correct = item.answer;

    let k = 0;
    const optionCount = item.options ? item.options.length : 4;
    for (let oIdx = 0; oIdx < optionCount; oIdx++) {
      const chosen = given.includes(oIdx);
      const shouldChoose = correct.includes(oIdx);
      if (chosen !== shouldChoose) k++;
    }

    const isCorrect = k === 0;
    if (isCorrect) {
      card.classList.add('correct');
    } else {
      card.classList.add('incorrect');
    }
    const removedFromWrongBook = recordChoiceResult(item, isCorrect, isPractice);

    const options = card.querySelectorAll('.quiz-option');
    options.forEach((opt, idx) => {
      opt.classList.toggle('selected', given.includes(idx));
      opt.classList.toggle('correct-answer', correct.includes(idx));
    });

    const confirmBtn = document.getElementById(`confirm-${itemId}`);
    if (confirmBtn) confirmBtn.style.display = 'none';

    if ((removedFromWrongBook || isPractice) && wrongPracticeMode) {
      setTimeout(() => {
        wrongPracticeState = { quiz: {}, gradedQuestions: {} };
        rerenderQuizSection();
      }, 700);
    }
  }

  function handleTextAnswerInput(itemId, subIdx, textarea, countId) {
    const text = textarea.value;
    const countEl = document.getElementById(countId);
    if (countEl) countEl.textContent = `${text.length} 字`;

    if (!state.textAnswers[itemId]) state.textAnswers[itemId] = {};
    state.textAnswers[itemId][subIdx] = text;
    rememberLastQuestion(itemId);
    store.save(state);
    updateProgressUI();
  }

  function toggleRubric(itemId) {
    const rubric = document.getElementById(`rubric-${itemId}`);
    if (rubric) rubric.classList.toggle('visible');
  }

  function gradeQuiz() {
    if (state.graded) {
      showToast('測驗已評分！');
      return;
    }

    state.graded = true;
    store.save(state);

    // Calculate score as a 100-point percentage across the full question bank.
    let correctCount = 0;
    const quizItems = window.COURSE.quiz;
    const totalQuestions = quizItems.length || 1;

    // Grade choice questions
    quizItems.forEach(item => {
      const card = document.getElementById(`card-${item.id}`);
      if (!card) return;
      card.setAttribute('data-graded', 'true');

      if (item.type === 'single') {
        const given = state.quiz[item.id];
        const correct = item.answer;
        if (given === correct) {
          card.classList.add('correct');
          correctCount += 1;
        } else {
          card.classList.add('incorrect');
        }
      }
      else if (item.type === 'multiple') {
        const given = state.quiz[item.id] || [];
        const correct = item.answer;

        // Multiple-choice grading for this question bank: full match only.
        let k = 0;
        const optionCount = item.options ? item.options.length : 4;
        for (let oIdx = 0; oIdx < optionCount; oIdx++) {
          const chosen = given.includes(oIdx);
          const shouldChoose = correct.includes(oIdx);
          if (chosen !== shouldChoose) k++;
        }

        if (k === 0) {
          card.classList.add('correct');
          correctCount += 1;
        } else {
          card.classList.add('incorrect');
        }
      }

      // Update styling on options
      if (item.type === 'single') {
        const options = card.querySelectorAll('.quiz-option');
        options.forEach((opt, idx) => {
          opt.classList.toggle('correct-answer', idx === item.answer);
        });
      } else if (item.type === 'multiple') {
        const options = card.querySelectorAll('.quiz-option');
        options.forEach((opt, idx) => {
          opt.classList.toggle('correct-answer', item.answer.includes(idx));
        });
      }
    });

    // Display Score Card
    const scoreCard = document.getElementById('scoreCard');
    clear(scoreCard);

    const score = (correctCount / totalQuestions) * 100;

    scoreCard.append(el('h3', {}, '中餐葷食乙級學科題庫評分完成！'));
    scoreCard.append(el('div', { class: 'score-big' }, `${score.toFixed(1)} / 100`));

    let rating = '需要再加油！請詳細閱讀錯題解析，加強不熟練的學科觀念。';
    let ratingClass = 'fail';
    if (score >= 80) {
      rating = '達到乙級學科高熟練度，請持續複習錯題與法規細節。';
      ratingClass = 'pass';
    } else if (score >= 60) {
      rating = '已掌握多數基礎觀念，建議加強複選題與衛生法規題。';
      ratingClass = 'pass';
    }

    scoreCard.append(el('div', { class: 'score-rating ' + ratingClass }, rating));
    scoreCard.append(el('div', { class: 'score-detail', style: 'margin-top: 16px;' }, `說明：本題庫共 ${totalQuestions} 題，答對 ${correctCount} 題，換算為百分制。單選題答對得分；複選題需完全符合標準答案才列為正確，無倒扣。`));
    scoreCard.classList.add('visible');

    // Scroll to score card
    scoreCard.scrollIntoView({ behavior: 'smooth' });

    showToast('評分完成！請查閱解析。');
    updateProgressUI();
  }



  function gradeWrongPractice() {
    const quizItems = getWrongBookItems();
    if (!quizItems.length) {
      showToast('目前沒有錯題可重練。');
      return;
    }

    let answered = 0;
    quizItems.forEach(item => {
      if (!hasChoiceAnswer(item, wrongPracticeState.quiz[item.id]) || wrongPracticeState.gradedQuestions[item.id]) {
        return;
      }
      answered += 1;
      wrongPracticeState.gradedQuestions[item.id] = true;
      if (item.type === 'single') {
        gradeSingleQuestion(item.id, wrongPracticeState.quiz[item.id], true);
      } else if (item.type === 'multiple') {
        gradeMultipleQuestion(item.id, true);
      }
    });

    if (answered === 0) {
      showToast('請先作答至少一題錯題。');
      return;
    }

    const scoreCard = document.getElementById('scoreCard');
    clear(scoreCard);
    const remaining = getWrongBookCount();
    scoreCard.append(el('h3', {}, '錯題重練已送出'));
    scoreCard.append(el('div', { class: 'score-detail' }, `本次批改 ${answered} 題，目前錯題庫剩餘 ${remaining} 題。連續答對 2 次的題目會自動出庫。`));
    scoreCard.classList.add('visible');
    scoreCard.scrollIntoView({ behavior: 'smooth' });
    updateProgressUI();
  }

  function updateProgressUI() {
    const quizItems = window.COURSE.quiz || [];
    const choiceItems = quizItems.filter(item => item.type !== 'text');
    const textItems = quizItems.filter(item => item.type === 'text');

    // Count answers
    let answeredChoices = 0;
    choiceItems.forEach(item => {
      if (state.quiz[item.id] !== undefined) {
        if (Array.isArray(state.quiz[item.id])) {
          if (state.quiz[item.id].length > 0) answeredChoices++;
        } else {
          answeredChoices++;
        }
      }
    });

    let answeredText = 0;
    textItems.forEach(item => {
      if (state.textAnswers[item.id]) {
        // Count subquestions filled
        const subCount = Object.keys(state.textAnswers[item.id]).length;
        if (subCount === item.subQuestions.length) answeredText++;
      }
    });

    const totalQuestions = quizItems.length;
    const answeredTotal = answeredChoices + answeredText;
    const percent = totalQuestions > 0 ? Math.round((answeredTotal / totalQuestions) * 100) : 0;

    const progressPercent = document.getElementById('progressPercent');
    const progressBar = document.getElementById('progressBar');

    if (progressPercent) progressPercent.textContent = `${percent}%`;
    if (progressBar) progressBar.style.width = `${percent}%`;

    // Update accordion pills
    updateAccordionPills(answeredChoices, answeredText);
  }

  function updateAccordionPills(choices, texts) {
    // Q1-Q24 in u-1
    let u1Count = 0;
    for(let i=1; i<=24; i++) {
      if (state.quiz[`q${i}`] !== undefined) u1Count++;
    }
    const pill1 = document.getElementById('pill-u-1');
    if (pill1) pill1.textContent = `${u1Count} / 24`;

    // Q25-Q31 in u-2
    let u2Count = 0;
    for(let i=25; i<=31; i++) {
      if (state.quiz[`q${i}`] && state.quiz[`q${i}`].length > 0) u2Count++;
    }
    const pill2 = document.getElementById('pill-u-2');
    if (pill2) pill2.textContent = `${u2Count} / 7`;

    // Q32-Q36 in u-3
    let u3Count = 0;
    if (state.quiz['q32'] !== undefined) u3Count++;
    if (state.quiz['q33'] !== undefined) u3Count++;
    if (state.textAnswers['q34'] && Object.keys(state.textAnswers['q34']).length === 4) u3Count++;
    if (state.textAnswers['q35'] && Object.keys(state.textAnswers['q35']).length === 1) u3Count++;
    if (state.textAnswers['q36'] && Object.keys(state.textAnswers['q36']).length === 2) u3Count++;
    const pill3 = document.getElementById('pill-u-3');
    if (pill3) pill3.textContent = `${u3Count} / 5`;

    // Set accordion class to done if finished
    toggleAccordionDone('day1-u-1', u1Count === 24);
    toggleAccordionDone('day1-u-2', u2Count === 7);
    toggleAccordionDone('day1-u-3', u3Count === 5);
  }

  function toggleAccordionDone(id, isDone) {
    const acc = document.getElementById(id);
    if (acc) {
      acc.classList.toggle('done', isDone);
    }
  }

  /* ============================================================
   * Timer Script (90 Minutes)
   * ============================================================ */
  let examTimer = null;
  let timeRemaining = (window.COURSE && window.COURSE.meta && window.COURSE.meta.timerSeconds)
    ? window.COURSE.meta.timerSeconds
    : 5400; // 90 mins in seconds
  let timerRunning = false;

  function initTimer() {
    const timerDisplay = document.getElementById('timerDisplay');
    const timerToggleBtn = document.getElementById('timerToggleBtn');
    const timerWidget = document.getElementById('timerWidget');

    // Load saved time if any
    const savedTime = localStorage.getItem(`${STORE_KEY}-time-remaining`);
    if (savedTime !== null) {
      timeRemaining = parseInt(savedTime, 10);
    }
    updateTimerDisplay();

    timerToggleBtn.addEventListener('click', () => {
      if (timerRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    });
  }

  function startTimer() {
    timerRunning = true;
    document.getElementById('timerToggleBtn').textContent = '暫停計時';
    document.getElementById('timerWidget').classList.add('running');

    examTimer = setInterval(() => {
      if (timeRemaining > 0) {
        timeRemaining--;
        updateTimerDisplay();
        localStorage.setItem(`${STORE_KEY}-time-remaining`, timeRemaining);

        // Time warning
        if (timeRemaining === 600) {
          showToast('⚠️ 注意：剩餘時間 10 分鐘！');
        } else if (timeRemaining === 300) {
          showToast('⚠️ 警告：剩餘時間 5 分鐘！');
        }
      } else {
        expireTimer();
      }
    }, 1000);
  }

  function pauseTimer() {
    timerRunning = false;
    document.getElementById('timerToggleBtn').textContent = '恢復計時';
    document.getElementById('timerWidget').classList.remove('running');
    clearInterval(examTimer);
  }

  function expireTimer() {
    timerRunning = false;
    clearInterval(examTimer);
    document.getElementById('timerWidget').classList.add('expired');
    document.getElementById('timerDisplay').textContent = '時間到';
    document.getElementById('timerToggleBtn').textContent = '測驗結束';
    document.getElementById('timerToggleBtn').disabled = true;
    showToast('🚨 測驗時間已到！系統已自動存檔，請送出試卷進行評分。');
    gradeQuiz();
  }

  function updateTimerDisplay() {
    const minutes = Math.floor(timeRemaining / 60);
    const seconds = timeRemaining % 60;
    document.getElementById('timerDisplay').textContent =
      `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  }

  /* ============================================================
   * Unified Material Viewer Modal (Pattern 10 & 11)
   * ============================================================ */
  function openViewer(url) {
    const modal = el('div', { class: 'viewer-modal' });
    modal.append(el('div', { class: 'viewer-backdrop', onclick: () => closeViewer(modal) }));

    const frame = el('div', { class: 'viewer-frame' });
    frame.append(el('button', { class: 'viewer-close', type: 'button', onclick: () => closeViewer(modal) }, '×'));

    // We can't render raw Markdown directly inside an iframe simply, so let's load a custom viewer if it is an MD file
    const iframeUrl = url.endsWith('.md') ? `viewer.html?file=${encodeURIComponent(url)}` : url;
    frame.append(el('iframe', { src: iframeUrl, loading: 'lazy' }));
    modal.append(frame);

    document.body.appendChild(modal);
    document.body.style.overflow = 'hidden'; // Body Scroll Lock (Pattern 11)

    // Esc to close
    document.addEventListener('keydown', function esc(e) {
      if (e.key === 'Escape') {
        closeViewer(modal);
        document.removeEventListener('keydown', esc);
      }
    });
  }

  function closeViewer(modal) {
    modal.remove();
    document.body.style.overflow = '';
  }

  /* ============================================================
   * Theme switcher
   * ============================================================ */
  function initTheme() {
    const themeToggle = document.getElementById('themeToggle');
    const initialTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', initialTheme);
    themeToggle.textContent = initialTheme === 'dark' ? '切換淺色' : '切換深色';

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeToggle.textContent = next === 'dark' ? '切換淺色' : '切換深色';
      showToast(`主題已切換為 ${next === 'dark' ? '深色' : '淺色'}`);
    });
  }

  /* ============================================================
   * Sync Mechanism (QR Code Syncing)
   * ============================================================ */
  function initSync() {
    const syncBtn = document.getElementById('syncBtn');
    if (syncBtn) {
      syncBtn.addEventListener('click', showSyncModal);
    }

    // If a sync was just loaded, show a toast after a short delay
    if (window.__syncLoaded) {
      setTimeout(() => {
        showToast('🟢 已成功同步並載入作答進度！');
      }, 500);
    }
  }

  function showSyncModal() {
    if (typeof QRCode === 'undefined') {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
      script.onload = () => generateSyncQR();
      document.head.appendChild(script);
    } else {
      generateSyncQR();
    }
  }

  function generateSyncQR() {
    const code = compressState();
    const syncUrl = `${window.location.origin}${window.location.pathname}#sync=${encodeURIComponent(code)}`;

    let modal = document.getElementById('syncModal');
    if (!modal) {
      modal = el('div', { id: 'syncModal', class: 'modal-overlay' },
        el('div', { class: 'modal-content' },
          el('h3', {}, '手機接續作答 / 進度同步'),
          el('p', { class: 'modal-desc' }, '請使用手機相機或 LINE 掃描下方二維碼，即可同步您目前的答題進度、計時時間與錯題庫，在手機上繼續測驗與重練。'),
          el('div', { id: 'qrcodeCanvas', class: 'qrcode-container' }),
          el('div', { class: 'manual-link-container' },
            el('span', {}, '手動複製連結：'),
            el('input', { id: 'syncUrlInput', type: 'text', readonly: true, value: syncUrl, onclick: (e) => e.target.select() }),
            el('button', {
              class: 'copy-link-btn',
              onclick: () => {
                const input = document.getElementById('syncUrlInput');
                input.select();
                document.execCommand('copy');
                showToast('📋 連結已複製到剪貼簿！');
              }
            }, '複製連結')
          ),
          el('button', { class: 'close-modal-btn', onclick: hideSyncModal }, '關閉')
        )
      );
      document.body.append(modal);
    } else {
      document.getElementById('syncUrlInput').value = syncUrl;
    }

    const qrcodeCanvas = document.getElementById('qrcodeCanvas');
    qrcodeCanvas.innerHTML = '';

    new QRCode(qrcodeCanvas, {
      text: syncUrl,
      width: 200,
      height: 200,
      colorDark : "#000000",
      colorLight : "#ffffff",
      correctLevel : QRCode.CorrectLevel.M
    });

    modal.classList.add('active');
  }

  function hideSyncModal() {
    const modal = document.getElementById('syncModal');
    if (modal) modal.classList.remove('active');
  }

  function restoreLastQuestionPosition() {
    const targetId = state.lastQuestion ? `card-${state.lastQuestion}` : state.lastSection;
    if (!targetId) return;

    window.requestAnimationFrame(() => {
      const target = document.getElementById(targetId);
      if (!target) return;
      target.scrollIntoView({ behavior: 'auto', block: 'start' });
      if (state.lastQuestion) showToast('已回到上次作答的位置');
    });
  }

  /* ============================================================
   * Toast helper
   * ============================================================ */
  function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();

    const t = el('div', { class: 'toast' }, msg);
    document.body.appendChild(t);
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => {
      t.classList.remove('show');
      setTimeout(() => t.remove(), 300);
    }, 2500);
  }

  /* ============================================================
   * ScrollSpy (Auto-highlight Current Section)
   * ============================================================ */
  function setupScrollSpy() {
    const sections = document.querySelectorAll('[data-section-id]');
    const links = document.querySelectorAll('.nav-link');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.dataset.sectionId;
          links.forEach(a => {
            a.classList.toggle('active', a.dataset.target === id);
          });
          // Update breadcrumb
          const text = Array.from(links).find(a => a.dataset.target === id)?.textContent || '';
          if (text) {
            const trail = document.getElementById('topbarTrail');
            trail.innerHTML = '';
            const homeA = el('a', { href: '../', style: 'color: inherit; text-decoration: none; font-weight: 700;' }, '首頁');
            trail.append(homeA);
            trail.append(document.createTextNode(` / ${text}`));
          }
        }
      });
    }, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });

    sections.forEach(s => observer.observe(s));
  }

  /* ============================================================
   * RWD Menu Button
   * ============================================================ */
  function initMobileMenu() {
    const topbar = document.querySelector('.topbar');
    const menuBtn = el('button', {
      class: 'timer-btn',
      style: 'margin-right: 12px; display: none; padding: 6px 12px;',
      type: 'button',
      onclick: toggleMobileSidebar
    }, '☰ 選單');

    // Inject menu button on small screen
    topbar.prepend(menuBtn);

    // Backdrop for mobile sidebar
    const backdrop = el('div', {
      id: 'sidebarBackdrop',
      onclick: toggleMobileSidebar
    });
    document.body.appendChild(backdrop);

    // Add CSS rules dynamically for RWD button
    const style = document.createElement('style');
    style.innerHTML = `
      @media (max-width: 992px) {
        .topbar button[onclick="toggleMobileSidebar"] { display: inline-flex !important; }
        #sidebarBackdrop.sidebar-backdrop-active {
          position: fixed; left: 0; top: 0; width: 100vw; height: 100vh;
          background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); z-index: 95;
        }
      }
    `;
    document.head.appendChild(style);
  }

  function toggleMobileSidebar() {
    const app = document.getElementById('app');
    const backdrop = document.getElementById('sidebarBackdrop');
    app.classList.toggle('sidebar-open');
    backdrop.classList.toggle('sidebar-backdrop-active');
  }

  /* ============================================================
   * init() — entry point
   * ============================================================ */
  function init() {
    const content = document.getElementById('content');

    // Render sections
    const overview = renderOverview();
    if (overview) content.append(overview);

    const day1 = renderDay('day1');
    if (day1) content.append(day1);

    const materials = renderMaterials();
    if (materials) content.append(materials);

    const quiz = renderQuiz();
    if (quiz) content.append(quiz);

    // Initialize scripts
    renderSidebar();
    initMobileMenu();
    initTheme();
    initTimer();
    initSync();
    updateProgressUI();
    setupScrollSpy();
    restoreLastQuestionPosition();
  }
  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
